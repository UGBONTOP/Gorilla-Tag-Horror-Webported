<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Gorilla Tag Horror Revived</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Gorilla Tag Horror Revived</div>
      </div>
    </div>

    <script>
      // ============================================================
      //  PART-FILE ASSEMBLER + INTERCEPTOR
      //  Runs synchronously before ANY other script so every code
      //  path Unity uses (fetch, XHR, WebAssembly streaming) is
      //  already patched when the loader and framework execute.
      // ============================================================
      (function () {

        // ---- file definitions ----
        // Keys are the exact filenames Unity will request (no path prefix
        // needed — we match by suffix below).
        var PARTS = {
          "newport fixes.wasm": {
            parts: [
              "Build/wasm/newport fixes.part1",
              "Build/wasm/newport fixes.part2",
              "Build/wasm/newport fixes.part3"
            ],
            mime: "application/wasm"
          },
          "newport fixes.data": (function () {
            var p = [];
            for (var i = 1; i <= 20; i++) {
              p.push("Build/data/newport fixes.part" + (i < 10 ? "0" + i : i));
            }
            return { parts: p, mime: "application/octet-stream" };
          })()
        };

        // ---- assemble cache (keyed by the logical filename) ----
        var _cache = {}; // filename -> Promise<{ buffer, blobUrl }>

        function getFilename(url) {
          // Strip query/hash, decode, take last path segment
          try {
            var u = new URL(url, location.href);
            var seg = decodeURIComponent(u.pathname).split("/").pop();
            return seg;
          } catch (e) {
            return url.split("/").pop().split("?")[0];
          }
        }

        function assemble(filename) {
          if (_cache[filename]) return _cache[filename];

          var entry = PARTS[filename];
          _cache[filename] = Promise.all(
            entry.parts.map(function (partUrl) {
              // Encode spaces in path segments only
              var encoded = partUrl.replace(/ /g, "%20");
              return fetch(encoded).then(function (r) {
                if (!r.ok) throw new Error("Part fetch failed: " + partUrl + " -> " + r.status);
                return r.arrayBuffer();
              });
            })
          ).then(function (buffers) {
            var total = buffers.reduce(function (s, b) { return s + b.byteLength; }, 0);
            var out   = new Uint8Array(total);
            var off   = 0;
            buffers.forEach(function (b) { out.set(new Uint8Array(b), off); off += b.byteLength; });
            var combined = out.buffer;
            var blobUrl  = URL.createObjectURL(new Blob([combined], { type: entry.mime }));
            console.log("[PartLoader] " + filename + " assembled — " + (total / 1048576).toFixed(1) + " MB -> " + blobUrl);
            return { buffer: combined, blobUrl: blobUrl };
          });

          return _cache[filename];
        }

        function matchEntry(url) {
          var name = getFilename(url);
          return PARTS[name] ? name : null;
        }

        // ============================================================
        //  1. Patch fetch
        // ============================================================
        var _origFetch = window.fetch.bind(window);
        window.fetch = function (input, init) {
          var url  = typeof input === "string" ? input : (input && input.url) || "";
          var name = matchEntry(url);
          if (name) {
            console.log("[PartLoader] fetch intercepted:", url);
            return assemble(name).then(function (r) { return _origFetch(r.blobUrl, init); });
          }
          return _origFetch(input, init);
        };

        // ============================================================
        //  2. Patch XMLHttpRequest
        // ============================================================
        var _XHROpen = XMLHttpRequest.prototype.open;
        var _XHRSend = XMLHttpRequest.prototype.send;

        XMLHttpRequest.prototype.open = function (method, url) {
          this._patchedUrl  = url;
          this._patchedName = matchEntry(url || "");
          _XHROpen.apply(this, arguments);
        };

        XMLHttpRequest.prototype.send = function (body) {
          var xhr  = this;
          var name = xhr._patchedName;
          if (name) {
            console.log("[PartLoader] XHR intercepted:", xhr._patchedUrl);
            assemble(name).then(function (r) {
              _XHROpen.call(xhr, "GET", r.blobUrl, true);
              _XHRSend.call(xhr, null);
            }).catch(function (err) {
              console.error("[PartLoader] XHR assembly error:", err);
              xhr.dispatchEvent(new ProgressEvent("error"));
            });
            return;
          }
          _XHRSend.apply(this, arguments);
        };

        // ============================================================
        //  3. Patch WebAssembly streaming APIs
        //     Unity's framework calls these directly with a fetch()
        //     Response. We swap in our assembled buffer instead.
        // ============================================================
        var _origInstStream = WebAssembly.instantiateStreaming.bind(WebAssembly);
        var _origCompStream = WebAssembly.compileStreaming.bind(WebAssembly);

        // Resolve a Response (or Promise<Response>) — if the URL matches
        // one of our split files replace it with a Response wrapping the
        // assembled ArrayBuffer.
        function resolveSource(source) {
          return Promise.resolve(source).then(function (resp) {
            var name = matchEntry(resp.url || "");
            if (!name) return resp;
            console.log("[PartLoader] WebAssembly streaming intercepted:", resp.url);
            return assemble(name).then(function (r) {
              return new Response(r.buffer, {
                status: 200,
                headers: { "Content-Type": "application/wasm" }
              });
            });
          });
        }

        WebAssembly.instantiateStreaming = function (source, importObject) {
          return resolveSource(source).then(function (resp) {
            return _origInstStream(resp, importObject).catch(function () {
              return resp.arrayBuffer().then(function (buf) {
                return WebAssembly.instantiate(buf, importObject);
              });
            });
          });
        };

        WebAssembly.compileStreaming = function (source) {
          return resolveSource(source).then(function (resp) {
            return _origCompStream(resp).catch(function () {
              return resp.arrayBuffer().then(function (buf) {
                return WebAssembly.compile(buf);
              });
            });
          });
        };

        // ============================================================
        //  4. Pre-warm — kick off assembly of both files immediately
        //     so the parts are downloading in parallel while the
        //     loader JS itself is being fetched.
        // ============================================================
        Object.keys(PARTS).forEach(function (name) {
          assemble(name);
        });

        console.log("[PartLoader] All interceptors installed + pre-warm started (fetch / XHR / WebAssembly streaming).");
      })();
    </script>

    <script>
      // ============================================================
      //  UNITY BOOTSTRAP  (identical to original template)
      // ============================================================
      var container        = document.querySelector("#unity-container");
      var canvas           = document.querySelector("#unity-canvas");
      var loadingBar       = document.querySelector("#unity-loading-bar");
      var progressBarFull  = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner    = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') {
          div.style = 'background: red; padding: 10px;';
        } else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function () {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl  = "Build";
      var loaderUrl = buildUrl + "/newport fixes.loader.js";

      var config = {
        // These still point at the "single file" names — the interceptor
        // above transparently redirects them to the assembled blob URLs.
        dataUrl:            buildUrl + "/newport fixes.data",
        frameworkUrl:       buildUrl + "/newport fixes.framework.js",
        codeUrl:            buildUrl + "/newport fixes.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName:        "Pinky vr",
        productName:        "Gorilla Tag Horror Revived",
        productVersion:     "11.0.0",
        showBanner:         unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name    = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className    = "unity-mobile";
        unityShowBanner('WebGL builds are not supported on mobile devices.');
      } else {
        canvas.style.width  = "960px";
        canvas.style.height = "600px";
      }

      loadingBar.style.display = "block";

      var script    = document.createElement("script");
      script.src    = loaderUrl;
      script.onload = function () {
        createUnityInstance(canvas, config, function (progress) {
          progressBarFull.style.width = 100 * progress + "%";
        }).then(function (unityInstance) {
          loadingBar.style.display = "none";
          fullscreenButton.onclick = function () {
            unityInstance.SetFullscreen(1);
          };
        }).catch(function (message) {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
